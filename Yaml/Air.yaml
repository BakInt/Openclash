# ==================== 策略组 Proxy Groups ====================
# 锚点定义：简化重复配置
default: &default
  type: select
  proxies:
    - 直连
    - 所有-智选
    - 所有-手选
    - 香港-故转
    - 台湾-故转
    - 日本-故转
    - 新加坡-故转
    - 美国-故转
    - 其他-故转
    - 家宽-手选
    - 超值通-智选
    - 拒绝

proxy-groups:
  # --- 业务场景分流 ---
  - {name: AI, <<: *default}
  - {name: Streaming, <<: *default}
  - {name: GitHub, <<: *default}
  - {name: Chat, <<: *default}  
  - {name: TikTok, <<: *default}  
  - {name: Google, <<: *default}  
  - {name: Apple, <<: *default}
  - {name: Microsoft, <<: *default}
  - {name: Games, <<: *default}
  - {name: Crypto, <<: *default}
  - {name: Test, <<: *default}
  - {name: Cloudflare, <<: *default}  
  - {name: Other, <<: *default}  

  # --- 自动化/手动选择组 ---
  - name: 所有-手选
    type: select
    include-all: true
    filter: "^((?!(直连|拒绝)).)*$"
  - name: 所有-智选
    type: smart
    include-all: true
    policy-priority: ".*香港.*:1.5;.*台湾.*:1.5"
    uselightgbm: true
    collectdata: true
    health-check: {enable: true, url: https://www.gstatic.com/generate_204, interval: 60, tolerance: 2}
    strategy: sticky-sessions
    interval: 60
    filter: "^((?!(直连|拒绝)).)*$"

  # --- 区域分组 (Fallback 故障转移) ---
  - name: 香港-故转
    type: fallback
    interval: 180
    proxies: [香港-手选, 香港-智选]
  - name: 香港-手选
    type: select
    include-all: true
    filter: "(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$"
  - name: 香港-智选
    type: smart
    include-all: true
    uselightgbm: true
    health-check: {enable: true, url: https://www.gstatic.com/generate_204, interval: 60, tolerance: 2}
    filter: "(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$"
 
  - name: 台湾-故转
    type: fallback
    interval: 180
    proxies: [台湾-手选, 台湾-智选]
  - name: 台湾-手选
    type: select
    include-all: true
    filter: "(?=.*(广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan)).*$"
  - name: 台湾-智选
    type: smart
    include-all: true
    filter: "(?=.*(广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan)).*$"

  - name: 日本-故转
    type: fallback
    interval: 180
    proxies: [日本-手选, 日本-智选]
  - name: 日本-手选
    type: select
    include-all: true
    filter: "(?=.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)).*$"
  - name: 日本-智选
    type: smart
    include-all: true
    filter: "(?=.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)).*$"

  - name: 新加坡-故转
    type: fallback
    interval: 180
    proxies: [新加坡-手选, 新加坡-智选]
  - name: 新加坡-手选
    type: select
    include-all: true
    filter: "(?=.*(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore)).*$"
  - name: 新加坡-智选
    type: smart
    include-all: true
    filter: "(?=.*(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore)).*$"

  - name: 美国-故转
    type: fallback
    interval: 180
    proxies: [美国-手选, 美国-智选]
  - name: 美国-手选
    type: select
    include-all: true
    filter: "(?=.*(广美|美|US|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|拉斯|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States)).*$"
  - name: 美国-智选
    type: smart
    include-all: true
    filter: "(?=.*(广美|美|US|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|拉斯|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States)).*$"

  # --- 其他节点 & 特殊业务 ---
  - name: 其他-故转
    type: fallback
    interval: 180
    proxies: [其他-手选, 其他-智选]
  - name: 其他-手选
    type: select
    include-all: true
    filter: "^((?!(直连|拒绝|广港|香港|HK|广台|台湾|TW|广日|日本|JP|广新|新加坡|SG|广美|美|US)).)*$"
  - name: 其他-智选
    type: smart
    include-all: true
    filter: "^((?!(直连|拒绝|广港|香港|广台|台湾|广日|日本|广新|新加坡|广美|美|中转家宽)).)*$"

  - name: 超值通-智选
    type: smart
    include-all: true
    health-check: {enable: true, url: https://www.gstatic.com/generate_204, interval: 30, tolerance: 0}
    filter: "(?=.*(备用|月抛)).*$"
    
  # - name: 家宽-手选
  #   type: select
  #   include-all: true
  #   filter: "(?=.*(中转家宽)).*$"

